spring:
  application:
    name: pathFinder-spring-backend
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

app:
  datasource:
    baseline:
      url: jdbc:h2:~/baselinedb;AUTO_SERVER=TRUE
      driver-class-name: org.h2.Driver
      username: sa
      password:
    field:
      url: jdbc:h2:~/fielddb;AUTO_SERVER=TRUE
      driver-class-name: org.h2.Driver
      username: sa
      password:
    insights:
      url: jdbc:h2:~/insightsdb;AUTO_SERVER=TRUE
      driver-class-name: org.h2.Driver
      username: sa
      password:
    progress:
      url: jdbc:h2:~/progressdb;AUTO_SERVER=TRUE
      driver-class-name: org.h2.Driver
      username: sa
      password:
    valuation:
      url: jdbc:h2:~/valuationdb;AUTO_SERVER=TRUE
      driver-class-name: org.h2.Driver
      username: sa
      password:
